services:
  - type: web
    name: petconnect-backend
    env: node
    region: oregon
    plan: free
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      # Configura en Render Dashboard (no en repo):
      # - MONGODB_URI
      # - CLIENT_URL (Vercel u otros, separados por coma; p. ej. otra app en preview)
      #   CORS: localhost:5173/5174 ya está en código para dev; CLIENT_URL añade más
      # - OPENAI_API_KEY (si usarás Vetto con IA)
      # - OPENAI_MODEL (opcional)
      # - MAIL_* (opcional, recordatorios)
      # - ADMIN_NOTIFICATION_EMAILS (opcional)
      - key: UPLOADS_DIR
        # Free tier: sin disco persistente (uploads efímeros; se pierden en restarts).
        value: /tmp/uploads

